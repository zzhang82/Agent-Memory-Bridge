name: Bug report
description: Report a reproducible problem with Agent Memory Bridge.
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping harden Agent Memory Bridge. Please keep reports focused on one behavior so it is easier to reproduce and fix.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the user-visible symptom and why it looks wrong.
      placeholder: "Recall returns duplicate signals after..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: Describe the behavior you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the smallest commands, config, and data shape that trigger the issue.
      placeholder: |
        1. Start the MCP server with...
        2. Call `store` with...
        3. Call `recall` with...
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - MCP tools
        - CLI or scripts
        - SQLite storage
        - Import/export
        - Docs or examples
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Provide the released version, git SHA, or branch name you tested.
      placeholder: "v0.14.0 or abc1234"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, client app, and any relevant MCP runtime details.
      placeholder: |
        OS:
        Python:
        Client:
        Install method:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or trace output
      description: Paste only the smallest useful excerpt. Remove tokens, local secrets, and private memory content.
      render: text
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Reporter checklist
      options:
        - label: I removed secrets, local-only paths, and private memory content from this report.
          required: true
        - label: I searched existing issues before opening this one.
          required: true
