name: Client integration or install feedback
description: Report an install result, request support, or correct a client setup recipe.
title: "Client integration: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this for successful install evidence, setup gaps, compatibility questions, or corrections to a client recipe. Remove secrets, private paths, and memory contents before submitting.
  - type: input
    id: client
    attributes:
      label: Client or host application
      description: Name the client, host app, or runtime you want to integrate.
      placeholder: "Codex, Claude Desktop, Cursor, custom MCP host..."
    validations:
      required: true
  - type: input
    id: client-version
    attributes:
      label: Client version
      description: Include the version, channel, or commit if known.
      placeholder: "1.2.3, nightly, commit SHA..."
    validations:
      required: false
  - type: input
    id: operating-system
    attributes:
      label: Operating system
      description: Include the OS and version or distribution.
      placeholder: "Windows 11, macOS 15, Ubuntu 24.04..."
    validations:
      required: true
  - type: dropdown
    id: install-source
    attributes:
      label: Install source
      options:
        - GitHub source archive in a Python venv
        - Editable GitHub checkout
        - GitHub source through optional uvx
        - Docker image built from this repository
        - Existing install or unknown
        - Not installed yet
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Integration goal
      description: What should a successful integration allow a user to do?
      placeholder: "Use `store` and `recall` from the client without custom wrapper scripts."
    validations:
      required: true
  - type: textarea
    id: observed-result
    attributes:
      label: Observed result or blocker
      description: Share the redacted config shape, validation command, result, error, or missing documentation.
      placeholder: |
        GitHub tag or commit:
        Redacted config shape:
        Validation command and result:
        MCP tools visible in the client:
        Error or workaround:
    validations:
      required: true
  - type: dropdown
    id: request-type
    attributes:
      label: Request type
      options:
        - Successful install feedback
        - Setup documentation
        - Documentation correction
        - Example config
        - Compatibility fix
        - Client-specific helper
        - Unknown
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Client constraints
      description: Note sandboxing, transport, path, environment-variable, or startup-command constraints.
      placeholder: "stdio only, no shell expansion, Windows paths require escaping..."
    validations:
      required: false
  - type: input
    id: official-client-docs
    attributes:
      label: Official client documentation
      description: Link the first-party client page that supports a requested config correction, if applicable.
      placeholder: "https://official-client.example/docs/mcp"
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Request checklist
      options:
        - label: I included the client name and enough setup detail for maintainers to reason about compatibility.
          required: true
        - label: I removed secrets, tokens, and private local paths from pasted config.
          required: true
        - label: I did not treat a marketplace listing or client certification as established unless I linked direct evidence.
          required: true
