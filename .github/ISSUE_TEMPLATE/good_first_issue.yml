name: Good first issue
description: Suggest a small, well-scoped contribution for new contributors.
title: "Good first issue: "
labels:
  - good first issue
body:
  - type: markdown
    attributes:
      value: |
        Use this to propose starter-sized work with a clear outcome, low coordination risk, and enough context for a new contributor.
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe the small contribution in one focused scope.
      placeholder: "Add a sanitized example for..."
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why this helps
      description: Explain the user or maintainer value.
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Likely files or areas
      description: Point contributors to the most likely starting places without requiring them to touch unrelated code.
      placeholder: |
        - docs/...
        - examples/...
        - tests/...
    validations:
      required: false
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the concrete checks that make the issue complete.
      placeholder: |
        - [ ] Adds...
        - [ ] Includes...
        - [ ] Passes...
    validations:
      required: true
  - type: dropdown
    id: contribution-area
    attributes:
      label: Contribution area
      options:
        - Documentation
        - Examples
        - Tests
        - Tooling
        - Small bug fix
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Maintainer checklist
      options:
        - label: This can be completed without broad architectural context.
          required: true
        - label: This does not require changing release, security, or core storage contracts.
          required: true
        - label: The acceptance criteria are specific enough for a first-time contributor.
          required: true
