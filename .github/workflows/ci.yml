name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check installed dependencies
        run: python -m pip check

      - name: Check installed package metadata
        run: >
          python -c "import importlib.metadata as metadata, pathlib, tomllib;
          expected = tomllib.loads(pathlib.Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version'];
          actual = metadata.version('agent-memory-bridge');
          assert actual == expected, f'installed package version mismatch: expected {expected}, got {actual}';
          print(actual)"

      - name: Run tests
        run: python -m pytest

      - name: Run release contract check
        run: python scripts/check_release_contract.py

      - name: Run public surface check
        run: python scripts/check_public_surface.py

      - name: Run onboarding contract check
        run: python scripts/check_onboarding_contract.py

  quality:
    name: Quality gates / Python 3.13
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests scripts

      - name: Ruff format
        run: ruff format --check src tests scripts

      - name: Core typing
        run: >
          mypy
          src/agent_mem_bridge/schema.py
          src/agent_mem_bridge/repository.py
          src/agent_mem_bridge/signals.py
          src/agent_mem_bridge/query.py
          src/agent_mem_bridge/state_io.py
          src/agent_mem_bridge/command_provider.py
          src/agent_mem_bridge/database_maintenance.py

      - name: Core branch coverage
        run: >
          python -m pytest
          --cov=agent_mem_bridge.schema
          --cov=agent_mem_bridge.repository
          --cov=agent_mem_bridge.signals
          --cov=agent_mem_bridge.query
          --cov=agent_mem_bridge.state_io
          --cov=agent_mem_bridge.command_provider
          --cov=agent_mem_bridge.database_maintenance
          --cov=agent_mem_bridge.revisions
          --cov=agent_mem_bridge.service
          --cov=agent_mem_bridge.service_lock
          --cov=agent_mem_bridge.service_health
          --cov=agent_mem_bridge.record_projection
          --cov=agent_mem_bridge.poll_cursor
          --cov-branch
          --cov-report=term-missing
          --cov-fail-under=80

      - name: Audit dependencies
        run: pip-audit

      - name: Build and validate distributions
        run: |
          python -m build
          python -m twine check dist/*

      - name: Build hardened Docker runtime
        run: docker build --tag agent-memory-bridge:ci .

      - name: Smoke-test Docker version and non-root user
        run: |
          docker run --rm agent-memory-bridge:ci python -m agent_mem_bridge --version
          docker run --rm agent-memory-bridge:ci python -c "import os; assert os.getuid() == 10001"
