name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check installed dependencies
        run: python -m pip check

      - name: Check installed package metadata
        run: python -c "import importlib.metadata as m; print(m.version('agent-memory-bridge'))"

      - name: Run tests
        run: python -m pytest

      - name: Run release contract check
        run: python scripts/check_release_contract.py

      - name: Run public surface check
        run: python scripts/check_public_surface.py

      - name: Run onboarding contract check
        run: python scripts/check_onboarding_contract.py
