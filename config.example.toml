# Core local bridge runtime.
[bridge]
home = "~/.local/share/agent-memory-bridge"
db_path = "bridge.db"
log_dir = "logs"

# Optional profile-source helpers for curated startup overlays or migration work.
# Basic bridge usage does not require a populated source_root.
[profile]
source_root = "~/.config/agent-memory-bridge/profile-source"
namespace = "global"
reflex_actor = "bridge-reflex"
consolidation_actor = "bridge-consolidation"
learn_title_prefix = "[[Learn]]"
domain_title_prefix = "[[Domain Note]]"

# Optional metadata-only telemetry.
[telemetry]
mode = "off"
log_dir = "telemetry"
service_name = "agent-memory-bridge"

# Optional retrieval mode.
# `lexical` keeps the stable SQLite FTS5 path as the default.
# `semantic` and `hybrid` use a local derived sidecar cache and should be
# validated against your own corpus before becoming the default.
[retrieval]
mode = "lexical"
semantic_scan_limit = 1000
hybrid_semantic_weight = 18.0
embedding_provider = "hash"
embedding_command = ""
embedding_model = ""
embedding_dim = 64
embedding_timeout_seconds = 10

# Optional scheduled sidecar warmer.
# This maintains the derived `memory_embeddings` cache in the background service
# without changing durable memory rows or enabling hybrid retrieval by itself.
[embedding_scheduler]
enabled = false
state_path = "embedding-sidecar-state.json"
interval_seconds = 3600
batch_size = 100

# Optional rollout/session capture helpers.
# Current watcher workflows are most mature around Codex-style rollout files,
# but basic MCP bridge usage does not require them.
[watcher]
# Conservative default: the core service does not scrape Codex rollout logs
# unless you explicitly opt in. Multi-runtime workflows should prefer AMB-native
# candidates/signals and governance triggers over client-specific log watchers.
enabled = false
sessions_root = "sessions"
notes_root = "session-notes/auto"
state_path = "watcher-state.json"
log_dir = "watcher-logs"
idle_seconds = 60
checkpoint_seconds = 300
checkpoint_min_messages = 2

[reflex]
# Conservative default: automatic summaries are not promoted into visible
# learn/gotcha rows by the always-on service unless explicitly enabled.
enabled = false
state_path = "reflex-state.json"
scan_limit = 200

# Conservative by default: automatic reflex summaries can become learn/gotcha
# records, but they do not feed strong consolidation unless explicitly reviewed.
[consolidation]
enabled = false
state_path = "consolidation-state.json"
scan_limit = 200
allow_reflex_sources = false

# Optional classifier-assisted enrichment.
[classifier]
mode = "off"
provider = "command"
command = ""
timeout_seconds = 10
batch_size = 16
minimum_confidence = 0.6

# Optional background polling loop.
[service]
poll_seconds = 30
